worker_processes 1;
events { worker_connections 1024; }
http {
    server {
        listen 8080;
        # Strip /rest/v1/ prefix and forward to PostgREST
        location /rest/v1/ {
            proxy_pass http://postgrest.railway.internal:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location / {
            proxy_pass http://postgrest.railway.internal:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
