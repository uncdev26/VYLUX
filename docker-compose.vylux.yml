# VYLUX — Full Stack Docker Compose
# Run: ./scripts/setup.sh && docker compose up -d

name: vylux

services:
  # =============================================
  # LobeHub (VYLUX fork) — Agent Platform
  # =============================================
  vylux:
    build: .
    ports:
      - "3210:3210"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - KEY_VAULTS_SECRET=${KEY_VAULTS_SECRET}
      - AUTH_SECRET=${AUTH_SECRET}
      - APP_URL=${APP_URL:-http://localhost:3210}
      - INTERNAL_APP_URL=${INTERNAL_APP_URL:-http://localhost:3210}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_BUCKET=${S3_BUCKET:-vylux}
      - S3_ENABLE_PATH_STYLE=1
      - S3_SET_ACL=0
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-admin}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - LLM_VISION_IMAGE_USE_BASE64=1
    depends_on:
      vylux-db:
        condition: service_healthy
      vylux-redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: always

  # =============================================
  # VYLUX Public Website (Astro SSR + Svelte)
  # =============================================
  site:
    build:
      context: ./apps/site
      dockerfile: Dockerfile
    ports:
      - "4321:4321"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      vylux-db:
        condition: service_healthy
    restart: always

  # =============================================
  # Database (ParadeDB — single instance)
  # =============================================
  vylux-db:
    image: paradedb/paradedb:latest-pg17
    environment:
      POSTGRES_DB: lobehub
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - vylux-db-data:/var/lib/postgresql/data
      - ./packages/database/migrations:/docker-entrypoint-initdb.d
    command: ["postgres", "-c", "shared_preload_libraries=pg_search,pg_cron"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # =============================================
  # Redis
  # =============================================
  vylux-redis:
    image: redis:7-alpine
    command: redis-server --save 60 1000 --appendonly yes
    volumes:
      - vylux-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # =============================================
  # Storage (MinIO — shared)
  # =============================================
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  vylux-db-data:
  vylux-redis-data:
  minio-data:
