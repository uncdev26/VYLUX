# VYLUX - Self-Hosted Supabase Stack
# For local development. On Railway, use Railway's PostgreSQL plugin + PostgREST service.

services:
  # PostgreSQL with Supabase extensions (local dev)
  db:
    image: supabase/postgres:15.14.1.142
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-i51VeqhMHU0mzVLUAOdG4gRTAXWUngj8}
    volumes:
      - supabase-data:/var/lib/postgresql/data
      - ./packages/database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./packages/database/seeds/01_design_tokens.sql:/docker-entrypoint-initdb.d/02_seeds.sql

  # PostgREST - REST API for PostgreSQL (Supabase-compatible)
  postgrest:
    image: postgrest/postgrest:latest
    ports:
      - "3001:3000"
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD:-changeme}@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-i51VeqhMHU0mzVLUAOdG4gRTAXWUngj8}
      PGRST_DB_MAX_ROWS: 1000
    depends_on:
      - db

  # LobeHub (AI features)
  lobehub:
    image: lobehub/lobehub:latest
    ports:
      - "3210:3210"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-changeme}@db:5432/postgres
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - db

  # VYLUX Website (Astro + Svelte)
  website:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "4321:4321"
    environment:
      PUBLIC_SUPABASE_URL: http://postgrest:3000
      PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
    depends_on:
      - postgrest

volumes:
  supabase-data:
